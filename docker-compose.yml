services:
  app:
    image: ghcr.io/openxerpa/python-api:${IMAGE_TAG:-latest}
    build: .
    environment:
      - PORT=8000

    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.python-api.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.python-api.entrypoints=web"
      - "traefik.http.services.python-api.loadbalancer.server.port=8000"

    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - webgateway

networks:
  webgateway:
    external: true
    name: traefik_webgateway
