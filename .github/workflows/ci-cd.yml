name: CI/CD

on:
  push:
    branches: [main, dev, test]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      env_name: ${{ steps.env.outputs.env_name }}
      traefik_host: ${{ steps.env.outputs.traefik_host }}
      image_tag_prefix: ${{ steps.env.outputs.image_tag_prefix }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "env_name=production" >> $GITHUB_OUTPUT
              echo "image_tag_prefix=prod" >> $GITHUB_OUTPUT
              echo "traefik_host=python-api.opendays.cc" >> $GITHUB_OUTPUT
              ;;
            dev)
              echo "env_name=dev" >> $GITHUB_OUTPUT
              echo "image_tag_prefix=dev" >> $GITHUB_OUTPUT
              echo "traefik_host=python-api.dev.opendays.cc" >> $GITHUB_OUTPUT
              ;;
            test)
              echo "env_name=test" >> $GITHUB_OUTPUT
              echo "image_tag_prefix=test" >> $GITHUB_OUTPUT
              echo "traefik_host=python-api.test.opendays.cc" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unsupported branch '${{ github.ref_name }}'"
              exit 1
              ;;
          esac

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies and run tests
        run: |
          uv venv
          uv pip install -r requirements.txt
          uv run pytest || test $? -eq 5

  build-and-push:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/python-api
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag_prefix }}-latest
            type=sha,prefix=${{ needs.prepare.outputs.image_tag_prefix }}-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha

  deploy:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Ansible
        run: uv tool install ansible-core --with ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          case "${{ needs.prepare.outputs.env_name }}" in
            production)
              echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
              ;;
            dev)
              echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
              ;;
            test)
              echo "${{ secrets.TEST_SSH_KEY }}" > ~/.ssh/id_rsa
              ;;
            *)
              echo "::error::Unknown env_name"
              exit 1
              ;;
          esac
          chmod 600 ~/.ssh/id_rsa

      - name: Run deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ansible_user="${DEPLOY_USER:-root}"
          case "${{ needs.prepare.outputs.env_name }}" in
            production)
              server_ip="${{ secrets.PROD_TAILSCALE_IP }}"
              ;;
            dev)
              server_ip="${{ secrets.DEV_TAILSCALE_IP }}"
              ;;
            test)
              server_ip="${{ secrets.TEST_TAILSCALE_IP }}"
              ;;
            *)
              echo "::error::Unknown env_name"
              exit 1
              ;;
          esac
          printf '[all]\n%s\n' "$server_ip" > /tmp/inventory.yml
          ansible-playbook -i /tmp/inventory.yml .github/deploy.yml \
            -e ansible_user="$ansible_user" \
            -e ansible_ssh_private_key_file=~/.ssh/id_rsa \
            -e compose_src=$GITHUB_WORKSPACE/docker-compose.yml \
            -e deploy_registry_user=${{ github.repository_owner }} \
            -e deploy_registry_token=${{ secrets.DEPLOY_REGISTRY_TOKEN }} \
            -e traefik_host=${{ needs.prepare.outputs.traefik_host }} \
            -e image_tag=${{ needs.prepare.outputs.image_tag_prefix }}-latest
