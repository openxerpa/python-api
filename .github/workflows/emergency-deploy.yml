name: Emergency Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. v1.0.0, dev-latest, prod-abc1234)'
        required: true
        type: string
      target_env:
        description: 'Target environment (production, dev, test, or dev-<username> e.g. dev-alice)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      traefik_host: ${{ steps.prepare.outputs.traefik_host }}
      deploy_dir: ${{ steps.prepare.outputs.deploy_dir }}
    steps:
      - name: Resolve traefik_host and deploy_dir
        id: prepare
        run: |
          env="${{ inputs.target_env }}"
          slug="python-api"
          case "$env" in
            production)
              echo "traefik_host=${slug}.opendays.cc" >> $GITHUB_OUTPUT
              echo "deploy_dir=/opt/apps/${slug}" >> $GITHUB_OUTPUT
              ;;
            dev)
              echo "traefik_host=${slug}.dev.opendays.cc" >> $GITHUB_OUTPUT
              echo "deploy_dir=/opt/apps/${slug}" >> $GITHUB_OUTPUT
              ;;
            test)
              echo "traefik_host=${slug}.test.opendays.cc" >> $GITHUB_OUTPUT
              echo "deploy_dir=/opt/apps/${slug}" >> $GITHUB_OUTPUT
              ;;
            dev-*)
              username="${env#dev-}"
              echo "traefik_host=${slug}-${username}.dev.opendays.cc" >> $GITHUB_OUTPUT
              echo "deploy_dir=/opt/apps/${slug}-${env}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unsupported target_env '$env'. Use production, dev, test, or dev-<username>"
              exit 1
              ;;
          esac

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Ansible
        run: uv tool install ansible-core --with ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          case "${{ inputs.target_env }}" in
            production)
              echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
              ;;
            dev|dev-*)
              echo "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/id_rsa
              ;;
            test)
              echo "${{ secrets.TEST_SSH_KEY }}" > ~/.ssh/id_rsa
              ;;
            *)
              echo "::error::Unsupported target_env"
              exit 1
              ;;
          esac
          chmod 600 ~/.ssh/id_rsa

      - name: Run deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ansible_user="${DEPLOY_USER:-root}"
          case "${{ inputs.target_env }}" in
            production)
              server_ip="${{ secrets.PROD_TAILSCALE_IP }}"
              ;;
            dev|dev-*)
              server_ip="${{ secrets.DEV_TAILSCALE_IP }}"
              ;;
            test)
              server_ip="${{ secrets.TEST_TAILSCALE_IP }}"
              ;;
            *)
              echo "::error::Unsupported target_env"
              exit 1
              ;;
          esac
          printf '[all]\n%s\n' "$server_ip" > /tmp/inventory.yml
          ansible-playbook -i /tmp/inventory.yml .github/deploy.yml \
            -e ansible_user="$ansible_user" \
            -e ansible_ssh_private_key_file=~/.ssh/id_rsa \
            -e compose_src=$GITHUB_WORKSPACE/docker-compose.yml \
            -e deploy_registry_user=${{ github.repository_owner }} \
            -e deploy_registry_token=${{ secrets.DEPLOY_REGISTRY_TOKEN }} \
            -e traefik_host=${{ needs.prepare.outputs.traefik_host }} \
            -e image_tag=${{ inputs.image_tag }} \
            -e deploy_dir=${{ needs.prepare.outputs.deploy_dir }}
